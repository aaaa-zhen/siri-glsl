<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Glass (QuartzCore RE)</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;color:#1d1d1f;font:13px/1.5 -apple-system,system-ui,sans-serif;
    display:flex;min-height:100vh;overflow:hidden}
  #stage{flex:1;display:flex;align-items:center;justify-content:center;position:relative}
  #gl{display:block;border-radius:0;background:#000}
  #panel{width:280px;background:#fff;border-left:1px solid #e2e2e6;padding:18px;
    overflow-y:auto;height:100vh}
  #panel h2{font-size:13px;font-weight:600;color:#1d1d1f;margin-bottom:4px;letter-spacing:.02em}
  #panel .sub{font-size:11px;color:#86868b;margin-bottom:18px}
  .grp{margin-bottom:16px}
  .grp .gh{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:#86868b;
    margin-bottom:8px;border-bottom:1px solid #e2e2e6;padding-bottom:4px}
  .row{margin-bottom:11px}
  .row label{display:flex;justify-content:space-between;font-size:11px;color:#444;margin-bottom:3px}
  .row label .v{color:#5b9dff;font-variant-numeric:tabular-nums}
  input[type=range]{width:100%;accent-color:#5b9dff;height:3px;cursor:pointer}
  .btns{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
  button{font:11px/1 inherit;font-weight:600;padding:7px 11px;border-radius:7px;
    border:1px solid #d2d2d7;background:#fff;color:#1d1d1f;cursor:pointer}
  button:hover{background:#f0f0f2}
  button.on{background:#5b9dff;color:#fff;border-color:#5b9dff}
  #bgfile{display:none}
  .bglabel{display:inline-block;font:11px/1 inherit;font-weight:600;padding:7px 11px;
    border-radius:7px;border:1px solid #d2d2d7;background:#fff;color:#1d1d1f;cursor:pointer}
  .hint{font-size:10px;color:#86868b;margin-top:6px;line-height:1.5}
</style>
</head>
<body>
<div id="stage"><canvas id="gl"></canvas></div>
<div id="panel">
  <h2>Liquid Glass</h2>
  <div class="sub">QuartzCore glass_background 重建 · 反汇编算法</div>

  <div class="grp">
    <div class="gh">背景</div>
    <div class="btns">
      <button class="bgmode on" data-bg="0">桌面感</button>
      <button class="bgmode" data-bg="1">壁纸渐变</button>
      <button class="bgmode" data-bg="2">网格</button>
      <label class="bglabel" for="bgfile">上传截图</label>
      <input type="file" id="bgfile" accept="image/*">
    </div>
    <div class="hint">上传你的截图 → 玻璃会折射它</div>
  </div>

  <div class="grp">
    <div class="gh">形状</div>
    <div class="row"><label>整体 scale <span class="v" id="vSC">1.00</span></label><input id="SC" type="range" min="30" max="160" value="100"></div>
    <div class="row"><label>整体 y 位置 <span class="v" id="vPY">0.50</span></label><input id="PY" type="range" min="8" max="92" value="50"></div>
    <div class="row"><label>宽 halfX <span class="v" id="vHX">.37</span></label><input id="HX" type="range" min="15" max="48" value="37"></div>
    <div class="row"><label>高 halfY <span class="v" id="vHY">.25</span></label><input id="HY" type="range" min="15" max="45" value="25"></div>
    <div class="row"><label>圆角 corner <span class="v" id="vCR">1.0</span></label><input id="CR" type="range" min="0" max="100" value="100"></div>
  </div>

  <div class="grp">
    <div class="gh">折射（透镜）</div>
    <div class="row"><label>强度 refraction <span class="v" id="vRF">200</span></label><input id="RF" type="range" min="0" max="260" value="200"></div>
    <div class="row"><label>放大 zoom <span class="v" id="vZM">1.00</span></label><input id="ZM" type="range" min="100" max="180" value="100"></div>
    <div class="row"><label>带宽 band <span class="v" id="vBD">170</span></label><input id="BD" type="range" min="60" max="500" value="170"></div>
    <div class="row"><label>球面/平缓 dome <span class="v" id="vDM">0.40</span></label><input id="DM" type="range" min="0" max="100" value="40"></div>
    <div class="row"><label>色差 aberration <span class="v" id="vAB">10</span></label><input id="AB" type="range" min="0" max="40" value="10"></div>
    <div class="row"><label>模糊 blur(backdrop) <span class="v" id="vBL">1.8</span></label><input id="BL" type="range" min="0" max="40" value="18"></div>
  </div>

  <div class="grp">
    <div class="gh">黑顶镜面</div>
    <div class="row"><label>黑区强度 <span class="v" id="vTD">0.93</span></label><input id="TD" type="range" min="0" max="100" value="93"></div>
    <div class="row"><label>黑区起点 <span class="v" id="vB0">-1.00</span></label><input id="B0" type="range" min="-100" max="80" value="-100"></div>
    <div class="row"><label>黑区终点 <span class="v" id="vB1">-.01</span></label><input id="B1" type="range" min="-50" max="120" value="-1"></div>
  </div>

  <div class="grp">
    <div class="gh">赤道亮线</div>
    <div class="row"><label>亮度 edgeBleed <span class="v" id="vEB">0.11</span></label><input id="EB" type="range" min="0" max="200" value="11"></div>
  </div>

  <div class="grp">
    <div class="gh">Siri Wave</div>
    <div class="btns"><button id="waveToggle">播放</button></div>
    <div class="row"><label>亮度 wave <span class="v" id="vWV">1.90</span></label><input id="WV" type="range" min="0" max="300" value="190"></div>
    <div class="row"><label>缩放 scale <span class="v" id="vWS">0.85</span></label><input id="WS" type="range" min="20" max="150" value="85"></div>
  </div>
</div>

<script id="vs" type="x-shader/x-vertex">
attribute vec2 aPos; void main(){ gl_Position=vec4(aPos,0.,1.); }
</script>

<script id="fs" type="x-shader/x-fragment">
precision highp float;
uniform vec2 iRes;
uniform sampler2D iBg;     // 原始清晰背景（泡外用）
uniform sampler2D iBlur;   // 已模糊的背景（透镜采样它）
uniform vec2 uHalf, uCenter;
uniform float uCorner, uRefraction, uBand, uDome, uAberration;
uniform float uTopDarken, uBlack0, uBlack1, uEdgeBleed;
uniform float iTime, uWaveAmp, uWaveScale, uZoom, uScale;

// ── 圆角矩形 SDF ──
float sdRoundRect(vec2 c, vec2 half_, float r){
  vec2 cc = abs(c) - (half_ - vec2(r));
  float outside = length(max(cc, 0.0)) - r;
  float inside = min(max(cc.x, cc.y), 0.0);
  return outside + inside;
}
// ── 解析 SDF 梯度（直接公式，不用 4 次采样）──
vec2 gradSdRoundRect(vec2 c, vec2 half_, float r){
  vec2 cc = abs(c) - (half_ - vec2(r));
  if(cc.x >= 0.0 || cc.y >= 0.0){
    return sign(c) * normalize(max(cc, 0.0) + 1e-6);
  } else {
    float gx = step(cc.y, cc.x);
    return sign(c) * vec2(gx, 1.0 - gx);
  }
}
// ── 圆映射：1−sqrt(1−x²)，物理正确的球面边缘 falloff ──
float circleMap(float x){ return 1.0 - sqrt(max(1.0 - x*x, 0.0)); }

// ── Siri Wave（siriWaveCore 简化版，装进玻璃赤道，见 SiriWave(4).html）──
const float PI = 3.14159265359;
vec3 spectral4(int s){ float x=float(s);
  return clamp(vec3(abs(x-3.0)-1.0, 2.0-abs(x-2.0), 2.0-abs(x-4.0)), 0.0, 1.0); }
vec3 waveCol(vec2 p, float t, float spread){
  float low =clamp(0.45+0.45*sin(t*0.8)*sin(t*0.37+1.0),0.0,1.0);
  float mid =clamp(0.40+0.40*sin(t*1.7+2.0)*sin(t*0.53),0.0,1.0);
  float high=clamp(0.30+0.30*sin(t*2.9+4.0)*sin(t*0.71+2.0),0.0,1.0);
  float drift=mod(t,20.0*PI)*2.4;
  float env=cos(PI*0.5*min(abs(0.9*p.x),1.0)); env*=env;
  float A1=0.30+0.01*low*6.0;
  float A2=A1+mid*0.05+high*0.06;
  float AB=2.6+mid*0.8+high*0.5;
  float th=0.03*spread, inten=0.01*(2.0+low*1.5), soft=0.01*max(0.0,2.5+mid*0.4)*spread;
  float yMain=A1*env*sin(p.x*1.1+drift);
  float bandAmt=1e-4*26000.0*inten;
  vec3 num=vec3(0.0),den=vec3(0.0);
  for(int s=0;s<4;s++){ vec3 hue=spectral4(s); den+=hue;
    float ab=mix(-AB,AB,float(s)/3.0);
    float yL=A2*env*sin(p.x+drift+ab);
    float d=abs(p.y-yL);
    float line=inten/(sqrt(d*d+soft*soft)+th);
    float lo=min(yMain,yL),hi=max(yMain,yL);
    float dB=max(0.0,max(p.y-hi,lo-p.y));
    float band=bandAmt/(dB+0.08);
    num+=hue*(line+band); }
  vec3 col=num/den;
  float dM=abs(p.y-yMain);
  col+=0.5*inten/(sqrt(dM*dM+soft*soft)+th);
  col=pow(max(col,0.0),vec3(1.5));
  return col*exp(-pow(p.x*1.2,2.0));
}

void main(){
  vec2 fc = gl_FragCoord.xy;
  vec2 uv = fc / iRes; vec2 uvf = vec2(uv.x, 1.0-uv.y);
  vec2 c = fc - uCenter; c.y = -c.y;          // 相对泡中心，y 向下
  float sd = sdRoundRect(c, uHalf, uCorner);

  // 泡外：原始清晰背景
  if(sd > 1.0){ gl_FragColor = vec4(texture2D(iBg, uvf).rgb, 1.); return; }
  sd = min(sd, 0.0);

  // ── 折射：圆映射 falloff × refractionAmount ──
  // refractionHeight = uBand（折射作用带宽），refractionAmount = uRefraction
  float refractionHeight = uBand;
  float x = 1.0 - (-sd / max(refractionHeight, 1.0));   // 边缘=0 中心→1
  float d = circleMap(clamp(x, 0.0, 1.0)) * uRefraction;

  // ── 梯度：解析 + depthEffect 混径向（球面深度感）──
  float gradRadius = min(uCorner*1.5, min(uHalf.x, uHalf.y));
  float depthEffect = uDome * 1.2;                       // 复用 dome 滑块当深度
  vec2 grad = normalize(gradSdRoundRect(c, uHalf, gradRadius) + depthEffect * normalize(c + 1e-5));
  vec2 gradUV = vec2(grad.x, -grad.y);

  vec2 push = gradUV * d / iRes;
  vec2 suv = uvf + push;                       // 折射后采样点
  // ── 厚透镜整体放大：以玻璃中心为锚向内收缩采样（中心也有折射感）──
  vec2 cuv = vec2(uCenter.x, iRes.y - uCenter.y) / iRes;
  suv = cuv + (suv - cuv) / uZoom;

  // ── 色差：苹果 chromatic_aberration_lpf（3 通道独立 offset，对称无偏色）──
  // R/G/B 三个 offset：G=0(基准)，R/B 沿折射方向反向偏移。
  // 偏移=0 时三通道采同一点 → 不偏色（这是苹果不泛黄的关键）。
  // 强度场用「四角强、中心/轴=0」的几何。
  float dispI = uAberration * ((c.x * c.y) / (uHalf.x * uHalf.y)) / 30.0;
  vec2 disp = gradUV * d * dispI / iRes;       // 偏移向量（与折射同向，随四角增强）
  vec3 col;
  col.r = texture2D(iBlur, suv + disp).r;      // R 正偏
  col.g = texture2D(iBlur, suv).g;             // G 基准（不偏，保证无整体偏色）
  col.b = texture2D(iBlur, suv - disp).b;      // B 反偏

  // ── 极淡玻璃体积色（冷调）──
  col = mix(col, col*vec3(0.94,0.96,1.0)+vec3(0.01,0.012,0.02), 0.22);

  // ── 上半黑镜面（柔过渡）──
  float ny = -c.y / uHalf.y;
  float blackMask = smoothstep(uBlack0, uBlack1, ny);
  blackMask = blackMask*blackMask*(3.0-2.0*blackMask);
  col = mix(col, vec3(0.012,0.015,0.025), blackMask*uTopDarken);

  // ── Siri Wave：光源在玻璃后方，坐标经透镜折射（与背景同一位移场，阻尼 0.5
  //    避免边缘大位移把波映满全球）；波是发光体，黑镜只小幅遮蔽 ──
  vec3 wglow = vec3(0.0);
  if(uWaveAmp > 0.001){
    vec2 cw = (c + vec2(grad.x, -grad.y) * d * 0.5) / uZoom;  // 与背景同一位移场，阻尼 0.5
    vec2 wp = vec2(cw.x/uHalf.x, -cw.y/uHalf.y - uBlack1) / max(uWaveScale, 0.1);
    float waveVis = 1.0 - blackMask*uTopDarken*0.85;
    wglow = waveCol(wp, iTime, 7.0) * vec3(0.80,0.95,1.25);   // 漫射光偏冷（玻璃体透蓝）
    float below = smoothstep(0.7, -0.5, wp.y);                // 波光向下洒：下方亮于上方
    col += (waveCol(wp, iTime, 1.0) + wglow*(0.25 + 0.6*below)) * uWaveAmp * waveVis;
  }

  // ── 玻璃厚度内圈暗边（宽度随整体 scale）──
  float innerEdge = smoothstep(0.,-18.*uScale,sd);
  col *= mix(0.70,1.,innerEdge);

  // ── 赤道亮线 ──
  float mid=(uBlack0+uBlack1)*0.5;
  float eqLine = smoothstep(uBlack0,mid,ny)*smoothstep(uBlack1,mid,ny);
  float horiz = 1.0 - abs(c.x)/uHalf.x*0.3;
  col += vec3(0.95,0.97,1.0)*eqLine*horiz*uEdgeBleed;

  // ── 底部边缘反光弧 ──
  float bottomRim = smoothstep(-14.*uScale,-2.*uScale,sd) * smoothstep(0.0,-0.6,-ny);
  col += vec3(0.85,0.88,0.95) * bottomRim * uEdgeBleed * 0.5;

  // ── 波光打在玻璃壳上：赤道亮线和底部反光弧吸收波的颜色 ──
  col += wglow * uWaveAmp * (eqLine*horiz + bottomRim) * 0.9;

  // ── 玻璃壳细高光：贴边一圈细线，底部更亮，吃波的颜色（苹果的轮廓感）──
  float shell = smoothstep(3.0*uScale, 0.0, abs(sd + 2.5*uScale));
  float shellLit = 0.30 + 0.70*smoothstep(0.3, -0.9, ny);
  col += (vec3(0.10,0.11,0.13) + wglow*uWaveAmp*1.2) * shell * shellLit;

  // ── 边缘抗锯齿 ──
  float aa = smoothstep(1.5, -1.5, sd);
  col = mix(texture2D(iBg, uvf).rgb, col, aa);

  gl_FragColor = vec4(col, 1.);
}
</script>

<!-- 可分离高斯模糊：一趟（横或纵，由 uDir 决定）。9 抽样高斯核。 -->
<script id="fs-blur" type="x-shader/x-fragment">
precision highp float;
uniform vec2 iRes; uniform sampler2D iTex; uniform vec2 uDir; uniform float uBlur;
void main(){
  vec2 uv = gl_FragCoord.xy / iRes;
  if(uBlur < 0.05){ gl_FragColor = texture2D(iTex, uv); return; }
  vec2 step = uDir * uBlur / iRes;
  // 9 抽样高斯（归一化权重）
  float w[5];
  w[0]=0.227027; w[1]=0.194595; w[2]=0.121622; w[3]=0.054054; w[4]=0.016216;
  vec4 acc = texture2D(iTex, uv) * w[0];
  for(int i=1;i<5;i++){
    acc += texture2D(iTex, uv + step*float(i)) * w[i];
    acc += texture2D(iTex, uv - step*float(i)) * w[i];
  }
  gl_FragColor = acc;
}
</script>

<!-- 合成：把(已模糊的)折射纹理 + 黑顶/亮线/暗边 叠出最终玻璃。泡外用原背景。 -->


<script>
const cv=document.getElementById('gl'), gl=cv.getContext('webgl');
function sh(t,s){const o=gl.createShader(t);gl.shaderSource(o,s);gl.compileShader(o);
  if(!gl.getShaderParameter(o,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(o));return o;}
const VS=document.getElementById('vs').textContent;
function makeProg(fsId){ const pr=gl.createProgram();
  gl.attachShader(pr,sh(gl.VERTEX_SHADER,VS));
  gl.attachShader(pr,sh(gl.FRAGMENT_SHADER,document.getElementById(fsId).textContent));
  gl.linkProgram(pr);
  if(!gl.getProgramParameter(pr,gl.LINK_STATUS))console.error(gl.getProgramInfoLog(pr));
  return pr; }
const pComp=makeProg('fs'), pBlur=makeProg('fs-blur');  // pComp=折射+合成
const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
function uloc(pr,n){const c=pr._u||(pr._u={});return n in c?c[n]:(c[n]=gl.getUniformLocation(pr,n));}
function bindQuad(pr){ const a=gl.getAttribLocation(pr,'aPos');
  gl.bindBuffer(gl.ARRAY_BUFFER,buf); gl.enableVertexAttribArray(a);
  gl.vertexAttribPointer(a,2,gl.FLOAT,false,0,0); }
// 离屏 framebuffer + 纹理（ping-pong）
function makeFBO(w,h){ const t=gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D,t);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,w,h,0,gl.RGBA,gl.UNSIGNED_BYTE,null);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  const f=gl.createFramebuffer(); gl.bindFramebuffer(gl.FRAMEBUFFER,f);
  gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,t,0);
  gl.bindFramebuffer(gl.FRAMEBUFFER,null); return {tex:t,fbo:f,w:w,h:h}; }
let fboA, fboB, fboH, fboQ, fboQ2;

// ── 画布尺寸（竖屏手机比例）──
// BW/BH = 实际显示像素 × dpr（1:1 映射，不缩放糊）
const AR = 1120/2420;                 // 玻璃画布宽高比
let BW, BH;
function computeSize(){
  const dpr = window.devicePixelRatio || 1;          // 不再 cap，用真实 dpr 保证锐利
  // 以视口高度的 88% 为显示高度，宽按比例
  const cssH = Math.round(window.innerHeight * 0.88);
  const cssW = Math.round(cssH * AR);
  // CSS 显示尺寸（逻辑像素）
  cv.style.height = cssH + 'px';
  cv.style.width  = cssW + 'px';
  // drawingBuffer 尺寸 = 显示尺寸 × dpr（物理像素，1:1 不缩放 → 不糊）
  BW = Math.round(cssW * dpr);
  BH = Math.round(cssH * dpr);
  cv.width = BW; cv.height = BH;

function makeBg(mode){
  const c=document.createElement('canvas');c.width=BW;c.height=BH;const x=c.getContext('2d');
  if(mode===0){ // 桌面感
    const g=x.createLinearGradient(0,0,0,BW);g.addColorStop(0,'#5a8fd8');g.addColorStop(1,'#bcd2ee');
    x.fillStyle=g;x.fillRect(0,0,BW,BH);
    x.fillStyle='#1e6ad8';x.fillRect(0,BW*0.55,BW*0.42,BW*0.45);
    x.fillStyle='#f0f0f2';x.fillRect(BW*0.58,BW*0.55,BW*0.42,BW*0.45);
    x.fillStyle='#e03030';x.beginPath();x.arc(BW*0.72,BW*0.72,14,0,7);x.fill();
    x.strokeStyle='rgba(0,0,0,.12)';for(let y=BW*0.2;y<BW*0.5;y+=14){x.beginPath();x.moveTo(0,y);x.lineTo(BW,y);x.stroke();}
  } else if(mode===1){ // 壁纸渐变
    const g=x.createLinearGradient(0,0,BW,BW);g.addColorStop(0,'#ff7e5f');g.addColorStop(.5,'#feb47b');g.addColorStop(1,'#7b6cff');
    x.fillStyle=g;x.fillRect(0,0,BW,BH);
  } else { // 网格
    x.fillStyle='#222';x.fillRect(0,0,BW,BH);
    x.strokeStyle='#5b9dff';for(let i=0;i<=BW;i+=40){x.beginPath();x.moveTo(i,0);x.lineTo(i,BW);x.moveTo(0,i);x.lineTo(BW,i);x.stroke();}
  }
  return c;
}
const tex=gl.createTexture();
let bgVer=0;                          // 背景版本号：变了才重算模糊
function setBg(canvasOrImg){
  bgVer++;
  gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,canvasOrImg);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  if(typeof requestRender!=="undefined")requestRender();
}
// 默认加载 IMG_4806（竖屏裁剪铺满）
function loadDefault(){
  const img=new Image();
  img.onload=()=>setBg(coverCrop(img));
  img.onerror=()=>setBg(makeBg(0));
  img.src=DEFAULT_BG;
}
// 按 BW:BH 比例 cover 裁剪，但输出画布保持原图分辨率（不降采样）
function coverCrop(img){
  const ar = BW/BH;                       // 目标宽高比
  let cw=img.width, ch=Math.round(img.width/ar);
  if(ch>img.height){ ch=img.height; cw=Math.round(img.height*ar); }
  const c=document.createElement('canvas'); c.width=cw; c.height=ch;
  const x=c.getContext('2d');
  x.drawImage(img,(img.width-cw)/2,(img.height-ch)/2,cw,ch,0,0,cw,ch);
  return c;
}
computeSize();
loadDefault();
document.querySelectorAll('.bgmode').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.bgmode').forEach(x=>x.classList.remove('on'));b.classList.add('on');
  setBg(makeBg(+b.dataset.bg));});
document.getElementById('bgfile').onchange=e=>{
  const f=e.target.files[0];if(!f)return;const img=new Image();
  img.onload=()=>setBg(coverCrop(img));
  img.src=URL.createObjectURL(f);};

// ── 滑块 ──
const P={};
function bind(id,key,scale,fmt){const s=document.getElementById(id),v=document.getElementById('v'+id);
  function up(){P[key]=s.value*scale;v.textContent=fmt?fmt(P[key]):P[key].toFixed(0); if(typeof requestRender!=="undefined")requestRender();}s.oninput=up;up();}
bind('SC','master',0.01,x=>x.toFixed(2)); bind('PY','posY',0.01,x=>x.toFixed(2));
bind('HX','halfX',0.01,x=>x.toFixed(2)); bind('HY','halfY',0.01,x=>x.toFixed(2));
bind('CR','corner',0.01,x=>x.toFixed(2));
bind('RF','refraction',1); bind('BD','band',1); bind('ZM','zoom',0.01,x=>x.toFixed(2));
bind('DM','dome',0.01,x=>x.toFixed(2)); bind('AB','aberration',1);
bind('BL','blur',0.1,x=>x.toFixed(1));
bind('TD','topDarken',0.01,x=>x.toFixed(2)); bind('B0','black0',0.01,x=>x.toFixed(2));
bind('B1','black1',0.01,x=>x.toFixed(2)); P.spec=0;
bind('EB','edgeBleed',0.01,x=>x.toFixed(2));
bind('WV','waveAmp',0.01,x=>x.toFixed(2)); bind('WS','waveScale',0.01,x=>x.toFixed(2));

// ── Siri Wave 动画开关 ──
let waveOn=false; const waveT0=performance.now();
const waveBtn=document.getElementById('waveToggle');
function waveLoop(){ if(!waveOn) return; render(); requestAnimationFrame(waveLoop); }
waveBtn.onclick=()=>{ waveOn=!waveOn;
  waveBtn.classList.toggle('on',waveOn);
  waveBtn.textContent=waveOn?'停止':'播放';
  if(waveOn) waveLoop(); else requestRender(); };
addEventListener('load',()=>waveBtn.onclick());   // 默认自动播放

// ── 渲染（正确顺序：先模糊背景，再透镜折射采样它）──
let blurKey='';                       // 模糊结果缓存：背景/模糊值/尺寸没变就跳过模糊管线
let blurTex=null;                     // 合成 pass 用的模糊纹理（缓存期间持续有效）
function render(){
  if(!fboA){ fboA=makeFBO(BW,BH); fboB=makeFBO(BW,BH);
    fboH=makeFBO(BW>>1,BH>>1); fboQ=makeFBO(BW>>2,BH>>2); fboQ2=makeFBO(BW>>2,BH>>2);
    blurKey=''; }
  const half=[BW*P.halfX*P.master, BW*P.halfY*P.master], center=[BW/2, BH*(1.0-P.posY)];
  const corner=BW*P.halfY*P.corner*P.master;

  const k = P.blur+'|'+BW+'x'+BH+'|'+bgVer;
  if(k !== blurKey){ blurKey = k;
    // 等效「MIP level 2 上做高斯」：两次 2x 降采样到 1/4 分辨率，
    // 在小图上卷积（像素数 1/16），合成时双线性放大回来 → 又快又顺滑
    gl.useProgram(pBlur); bindQuad(pBlur);
    gl.uniform1i(uloc(pBlur,'iTex'),0);
    gl.activeTexture(gl.TEXTURE0);
    const pass=(srcTex,dst,dx,dy,blur)=>{
      gl.bindFramebuffer(gl.FRAMEBUFFER,dst.fbo); gl.viewport(0,0,dst.w,dst.h);
      gl.uniform2f(uloc(pBlur,'iRes'),dst.w,dst.h);
      gl.uniform2f(uloc(pBlur,'uDir'),dx,dy);
      gl.uniform1f(uloc(pBlur,'uBlur'),blur);
      gl.bindTexture(gl.TEXTURE_2D,srcTex);
      gl.drawArrays(gl.TRIANGLES,0,3); };
    if(P.blur < 0.5){
      pass(tex, fboB, 0,0, 0.0);            // 不模糊：原图直拷（全分辨率）
      blurTex = fboB.tex;
    } else {
      pass(tex, fboH, 0,0, 0.0);            // 1/2 降采样
      pass(fboH.tex, fboQ, 0,0, 0.0);       // 1/4 降采样
      const per0 = P.blur/4;                // 1/4 分辨率下的等效半径
      const n = Math.max(1, Math.ceil(per0/2.5));
      const per = per0/Math.sqrt(n);
      for(let i=0;i<n;i++){                 // 高斯 ping-pong（结果回到 fboQ）
        pass(fboQ.tex,  fboQ2, 1,0, per);
        pass(fboQ2.tex, fboQ,  0,1, per);
      }
      blurTex = fboQ.tex;
    }
  }

  // Pass 3: 折射 + 合成 → 屏幕（折射采样模糊纹理 fboB，泡外用清晰 tex）
  gl.useProgram(pComp); bindQuad(pComp);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null); gl.viewport(0,0,BW,BH);
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, tex);        // iBg 清晰
  gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D, blurTex);    // iBlur 模糊
  gl.uniform1i(uloc(pComp,'iBg'),0);
  gl.uniform1i(uloc(pComp,'iBlur'),1);
  gl.uniform2f(uloc(pComp,'iRes'),BW,BH);
  gl.uniform2f(uloc(pComp,'uHalf'),half[0],half[1]);
  gl.uniform2f(uloc(pComp,'uCenter'),center[0],center[1]);
  gl.uniform1f(uloc(pComp,'uCorner'),corner);
  gl.uniform1f(uloc(pComp,'uRefraction'),P.refraction*P.master);
  gl.uniform1f(uloc(pComp,'uBand'),P.band*P.master);
  gl.uniform1f(uloc(pComp,'uScale'),P.master);
  gl.uniform1f(uloc(pComp,'uDome'),P.dome);
  gl.uniform1f(uloc(pComp,'uAberration'),P.aberration);
  gl.uniform1f(uloc(pComp,'uTopDarken'),P.topDarken);
  gl.uniform1f(uloc(pComp,'uBlack0'),P.black0);
  gl.uniform1f(uloc(pComp,'uBlack1'),P.black1);
  gl.uniform1f(uloc(pComp,'uEdgeBleed'),P.edgeBleed);
  gl.uniform1f(uloc(pComp,'iTime'),(performance.now()-waveT0)/1000);
  gl.uniform1f(uloc(pComp,'uWaveAmp'), waveOn ? P.waveAmp : 0.0);
  gl.uniform1f(uloc(pComp,'uWaveScale'),P.waveScale);
  gl.uniform1f(uloc(pComp,'uZoom'),P.zoom);
  gl.drawArrays(gl.TRIANGLES,0,3);
}
// 按需重绘：滑块/背景/尺寸变化时才渲（无动画，不常驻 rAF，省电）
var pending=false;
function requestRender(){ if(pending)return; pending=true;
  requestAnimationFrame(()=>{ pending=false; render(); }); }
addEventListener('resize',()=>{ computeSize(); requestRender(); });
requestRender();
</script>
